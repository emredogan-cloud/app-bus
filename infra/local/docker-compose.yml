# Local development dependencies for the api + ingestion + eta-engine apps.
# Postgres = TimescaleDB image (bundles PostGIS via the timescaledb-ha distribution).
services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: app_bus
      POSTGRES_PASSWORD: app_bus
      POSTGRES_DB: app_bus
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app_bus -d app_bus']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  emqx:
    image: emqx/emqx:5.8
    environment:
      EMQX_ALLOW_ANONYMOUS: 'true'
    ports:
      - '1883:1883' # MQTT
      - '18083:18083' # dashboard
    healthcheck:
      test: ['CMD', 'emqx', 'ctl', 'status']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
